<style>

    margin:0;
    font-family: Arial, sans-serif;
    background:#b30000;
}

/* Trống đồng mờ */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("./trongdong.png") center center no-repeat;
    background-size:500px;
    opacity:0.08;
    z-index:0;
}

.header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:25px 10px;
    position:relative;
    z-index:1;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    padding:30px;
    color:white;
    text-align:center;
    position:relative;
    z-index:1;
}

.title{
    color:#ffcc00;
    font-size:22px;
    margin-bottom:20px;
}

input{
    width:80%;
    padding:12px;
    border-radius:5px;
    border:none;
    margin-bottom:15px;
    text-align:center;
}

button{
    padding:10px 25px;
    background:#cc0000;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#990000;
}

.page{display:none;}

.hero-img{
    width:100%;
    max-width:500px;
    border-radius:10px;
    margin:20px 0;
}
</style>
</head>

    <h2>ỦY BAN BẦU CỬ PHƯỜNG TÂN THUẬN</h2>
</div>

function searchKP(){
    let kp = document.getElementById("kpInput").value;

    if(!data[kp]){
        alert("Không tìm thấy khu phố!");
        return;
    }

    document.getElementById("kp").innerText = kp;
    document.getElementById("donvi").innerText = data[kp].dv;
    document.getElementById("diadiem").innerText = data[kp].dd;

    document.getElementById("mapButton").innerHTML =
        `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data[kp].dd)}"
        target="_blank"
        style="display:inline-block;padding:10px 20px;background:#ffcc00;color:black;border-radius:8px;text-decoration:none;margin-top:10px;">
        📍 MỞ GOOGLE MAP
        </a>`;

    goPage(2);
}

function goPage(n){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById("page"+n).style.display="block";
}
