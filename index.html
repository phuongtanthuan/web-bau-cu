    background:#cc0000;

    <br>
    <button onclick="goPage(3)">XEM BẢN ĐỒ</button>

</div>

/* ================= FUNCTION ================= */

function searchKP(){
    let kp = document.getElementById("kpInput").value;
    if(!data[kp]){
        alert("Không tìm thấy khu phố!");
        return;
    }

    document.getElementById("kp").innerText = kp;
    document.getElementById("donvi").innerText = data[kp].dv;
    document.getElementById("diadiem").innerText = data[kp].dd;
    document.getElementById("mapLink").innerText = "👉 Tại đây bạn có thể chèn link Google Map tương ứng.";

    goPage(2);
}

function goPage(pageNumber){
    document.querySelectorAll(".page").forEach(p => p.style.display="none");
    document.getElementById("page"+pageNumber).style.display="block";
}
