function searchKP(){
    const value = document.getElementById("khuPhoInput").value;
    const resultDiv = document.getElementById("result");

    if(!data[value]){
        alert("Không tìm thấy khu phố!");
        return;
    }

    const info = data[value];
    let html = "";

    info.locations.forEach(loc=>{
        html += `
        <div class="result-box">
            <p><strong>Địa điểm:</strong> ${loc.name}</p>
            <p><strong>Địa chỉ:</strong> ${loc.address}</p>
            ${loc.map ? `<iframe src="${loc.map}" loading="lazy"></iframe>` : ""}
        </div>
        `;
    });

    resultDiv.innerHTML = html;

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";
}

function goBack(){
    document.getElementById("page2").style.display="none";
    document.getElementById("page1").style.display="block";
}
