<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu điểm bỏ phiếu - Phường Tân Thuận</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{
    background:#c40000;
    color:#fff;
    text-align:center;
    padding:20px;
    position:relative
}
header img{
    position:absolute;
    right:15px;
    top:10px;
    width:110px;
}
.banner img{width:100%;max-height:300px;object-fit:cover}
.search{
    text-align:center;
    padding:20px;
    background:#fff
}
input{
    padding:10px;
    width:220px;
    font-size:16px
}
button{
    padding:10px 18px;
    font-size:16px;
    background:#c40000;
    color:#fff;
    border:none;
    cursor:pointer
}
.result{padding:20px}
.map-box{
    background:#fff;
    margin-bottom:25px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1)
}
iframe{
    width:100%;
    height:320px;
    border:none;
    border-radius:8px
}
</style>
</head>

<body>

<header>
<h2>TRA CỨU ĐIỂM BỎ PHIẾU<br>PHƯỜNG TÂN THUẬN</h2>
<img src="trongdong.png">
</header>

<div class="banner">
<img src="anh.jpg">
</div>

<div class="search">
<input type="number" id="kp" placeholder="Nhập số khu phố (1-63)">
<button onclick="searchKP()">Tìm kiếm</button>
</div>

<div class="result" id="result"></div>

function searchKP(){
    const kp=document.getElementById("kp").value;
    const result=document.getElementById("result");

    if(!data[kp]){
        result.innerHTML="<h3>Không tìm thấy khu phố</h3>";
        return;
    }

    let html=`<h3>Khu phố ${kp}</h3>`;

    data[kp].forEach(link=>{
        html+=`
        <div class="map-box">
            <iframe src="${link}" loading="lazy"></iframe>
        </div>
        `;
    });

    result.innerHTML=html;
}
