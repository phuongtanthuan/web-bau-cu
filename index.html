<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu điểm bầu cử - Phường Tân Thuận</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

.header{
background:#c40000;
color:white;
text-align:center;
padding:25px 10px;
position:relative;
}

.header h1{
margin:0;
font-size:26px;
}

.trongdong{
position:absolute;
right:20px;
top:10px;
width:120px;
opacity:0.25; /* rõ hơn */
}

.search-box{
background:#111;
padding:20px;
text-align:center;
}

.search-box input{
padding:10px;
font-size:18px;
width:120px;
}

.search-box button{
padding:10px 20px;
background:#e00000;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

.result{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card h2{
margin-top:0;
color:#c40000;
}

iframe{
width:100%;
height:400px;
border:0;
border-radius:8px;
}

@media(max-width:600px){
iframe{
height:300px;
}
}
</style>
</head>

<body>

<div class="header">
<h1>TRA CỨU ĐIỂM BỎ PHIẾU<br>PHƯỜNG TÂN THUẬN</h1>
<img src="trongdong.png" class="trongdong">
</div>

<div class="search-box">
<input type="number" id="kp" min="1" max="63" placeholder="Nhập KP">
<button onclick="searchKP()">Tìm kiếm</button>
</div>

<div id="result" class="result"></div>

<script>

// ====== DATA GOOGLE MAP ======
// M nhập đủ 63 link embed vào đây
// Mẫu demo tao làm 3 cái trước

const data = {

1:{
name:"Khu phố 1",
map:"https://www.google.com/maps?q=10.7485723,106.7172376&output=embed"
},

2:{
name:"Khu phố 2",
map:"https://www.google.com/maps?q=10.7498968,106.7088865&output=embed"
},

5:{
name:"Khu phố 5 - Nhà Văn Hóa KP5",
map:"https://www.google.com/maps?q=10.7485723,106.7172376&output=embed"
}

// ===== COPY THÊM KP 3 → 63 VÀO ĐÂY =====

};

function searchKP(){

let kp = document.getElementById("kp").value;
let result = document.getElementById("result");

if(!kp){
alert("Nhập số khu phố");
return;
}

if(!data[kp]){
result.innerHTML="<div class='card'><h2>Không tìm thấy khu phố</h2></div>";
return;
}

let html = `
<div class="card">
<h2>${data[kp].name}</h2>
<iframe src="${data[kp].map}" loading="lazy"></iframe>
</div>
`;

result.innerHTML = html;

}

</script>

</body>
</html>
