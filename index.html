<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu địa điểm bầu cử</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#b30000;
}

/* TRỐNG ĐỒNG MỜ TO HƠN */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("trongdong.png") center center no-repeat;
    background-size:700px;
    opacity:0.15;
    z-index:0;
}

.header{
    background:#cc0000;
    color:white;
    text-align:center;
    padding:25px 10px;
    position:relative;
    z-index:1;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
    background:#111;
    border:2px solid gold;
    border-radius:15px;
    padding:30px;
    color:white;
    text-align:center;
    position:relative;
    z-index:1;
}

.title{
    color:#ffcc00;
    font-size:24px;
    margin-bottom:20px;
}

input{
    width:85%;
    padding:14px;
    border-radius:8px;
    border:none;
    margin-bottom:20px;
    text-align:center;
    font-size:16px;
}

button{
    padding:12px 30px;
    background:#cc0000;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#990000;
}

.page{display:none;}

.hero-img{
    width:100%;
    max-width:650px;
    border-radius:15px;
    margin:25px 0;
    border:3px solid gold;
}

.map-box iframe{
    width:100%;
    height:400px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>ỦY BAN BẦU CỬ PHƯỜNG TÂN THUẬN</h2>
</div>

<!-- TRANG 1 -->
<div class="container page" id="page1">
    <div class="title">TRA CỨU ĐỊA ĐIỂM BẦU CỬ</div>

    <img src="anh.jpg" class="hero-img">

    <input type="number" id="kpInput" placeholder="Nhập số khu phố (1 - 63)">
    <br>
    <button onclick="searchKP()">TÌM KIẾM</button>
</div>

<!-- TRANG 2 -->
<div class="container page" id="page2">
    <div class="title">THÔNG TIN KHU VỰC</div>

    <p><b>Khu phố:</b> <span id="kp"></span></p>
    <p><b>Địa điểm:</b> <span id="diadiem"></span></p>

    <div class="map-box" id="mapBox"></div>

    <br>
    <button onclick="goPage(1)">QUAY LẠI</button>
</div>

<script>

/* DỮ LIỆU MẪU - KP 1,2 ĐÃ CÓ IFRAME */
const data = {

1:{
    dd:"VP Khu phố 1,2 - 15 Trần Văn Khánh",
    map:`<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d244.98252803073566!2d106.7229571564723!3d10.75601489397565!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f62a5a59a3d%3A0xa0915d618b1d42d7!2zMTUgVHLhuqduIFbEg24gS2jDoW5o!5e0!3m2!1svi!2s!4v1772168172365!5m2!1svi!2s" allowfullscreen="" loading="lazy"></iframe>`
},

2:{
    dd:"VP Khu phố 1,2 - 15 Trần Văn Khánh",
    map:`<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d244.98252803073566!2d106.7229571564723!3d10.75601489397565!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f62a5a59a3d%3A0xa0915d618b1d42d7!2zMTUgVHLhuqduIFbEg24gS2jDoW5o!5e0!3m2!1svi!2s!4v1772168172365!5m2!1svi!2s" allowfullscreen="" loading="lazy"></iframe>`
}

};

function searchKP(){
    let kp = document.getElementById("kpInput").value;

    if(!data[kp]){
        alert("Chưa gắn Google Map khu phố này!");
        return;
    }

    document.getElementById("kp").innerText = kp;
    document.getElementById("diadiem").innerText = data[kp].dd;
    document.getElementById("mapBox").innerHTML = data[kp].map;

    goPage(2);
}

function goPage(n){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById("page"+n).style.display="block";
}

goPage(1);

</script>
</body>
</html>
